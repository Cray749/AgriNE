# render.yaml — Render Blueprint for AgriSutra NE
# Deploys two backend services from the single repo.
#
# Services:
#   1. agrisutra-backend   — FastAPI (the one Flutter app talks to)
#   2. agrisutra-streamlit — Streamlit web UI for desktop/browser users
#
# NOTE: The Flutter Android app is distributed as an APK directly.
#       No static site deployment needed for the Android app.
#
# After pushing this file:
#   → https://dashboard.render.com → "New" → "Blueprint" → connect repo

services:

  # ──────────────────────────────────────────────────────────────
  # 1. FastAPI Backend  ← THIS is what the Flutter app calls
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: agrisutra-backend
    runtime: python
    region: oregon            # change to "singapore" for lower latency from India
    plan: free
    rootDir: .                # run from repo root so `backend` is a package
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ──────────────────────────────────────────────────────────────
  # 2. Streamlit App  (for boss to use on browser / desktop)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: agrisutra-streamlit
    runtime: python
    region: oregon
    plan: free
    rootDir: agrisutra-ne-main
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ──────────────────────────────────────────────────────────────
  # 3. Jurivya NE Website (Static HTML Front-end)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: jurivya-ne
    env: static
    plan: free
    region: oregon
    rootDir: website
    buildCommand: "" # No build required for static HTML
    staticPublishPath: ./ # Publish everything inside the `website` directory
